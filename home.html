<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frosted Glass Effect Background</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-image: url('your--image.jpg'); /* 替换为您自己的背景图像 */
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      background-color: rgba(255, 255, 255, 0.5); /* 透明度 */
      padding: 20px;
      border-radius: 10px;
      backdrop-filter: blur(10px); /* 模糊效果 */
      text-align: center;
    }

    h1 {
      color: white;
    }
  </style>
</head>
<body>

<div class="content">
  <h1>Frosted Glass Effect Background</h1>
  <p>This is a simple example of creating a frosted glass effect background using CSS backdrop-filter property.</p>
</div>

</body>
</html>
